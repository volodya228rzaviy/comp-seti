<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koмбo: colspan + rowspan</title>
</head>
<body>
<table>
    <tr>
        <td colspan="2" rowspan="2">1.</td>
        <td>1.3</td>
    </tr>

    <tr>
        <td>2.3</td>
    </tr>
    <tr>
        <td>3.1</td>
        <td>3.2</td>
        <td>3.3</td>
    </tr>
</table>
</body>
</html>
